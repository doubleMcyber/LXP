agent_a_model: Qwen/Qwen2.5-0.5B
agent_b_model: LGAI-EXAONE/EXAONE-4.0-1.2B
default_prompt: Explain the concept of entropy
latent_steps: 10
max_new_tokens: 50
simulated_continuous_steps: 50
device_map: auto
torch_dtype: bfloat16
training:
  compressed_steps: 16
  learning_rate: 1.0e-05
  weight_decay: 0.01
  max_grad_norm: 1.0
  num_epochs: 1
  lambda_task: 1.0
  lambda_pref: 1.0
  lambda_geom: 1.0
  eps: 1.0e-08
