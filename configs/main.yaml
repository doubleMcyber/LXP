seed: 0
agent_a_model: "Qwen/Qwen3.5-2B"
agent_b_model: "Qwen/Qwen3.5-0.8B"
default_prompt: "Explain the concept of entropy"
latent_steps: 10
max_new_tokens: 50
simulated_continuous_steps: 50
device_map: "auto"
torch_dtype: "bfloat16"

runtime:
  device: "auto"  # auto, mps, cuda, cpu
  mps:
    enabled: true
    fallback_to_cpu: true
    torch_dtype: "float32"

datasets:
  gsm8k:
    validation_size: 256
  math:
    validation_size: 128

benchmark:
  answer_only_final: false
  text_hybrid_reasoning_max_new_tokens: 64
  sender_revision:
    enabled: false
    max_new_tokens: 512
    disagreement_verifier_enabled: true
    disagreement_verifier_max_new_tokens: 512
  latent_steps_sweep: [1, 2, 4, 8, 16, 32, 64]
  q_generalization:
    heldout_anchor_ratio: 0.2
    bootstrap_count: 5

alignment:
  strategy: "hybrid_affine"
  handoff_target: "input_embedding"
  diagnostic_target: "hidden_consensus"
  semantic_anchor_count: 250
  cache_dir: ".cache/alignment"
  reasoning_layer_weights: [0.2, 0.3, 0.5]
  center_anchors: true
  use_bias: true
  residual_lambda: 1.0e-3
  residual_alpha: 1.0
  residual_max_norm_ratio: 0.25
  anchor_selection_pool_size: 500
  anchor_stability_bootstrap_count: 3
  anchor_stability_bootstrap_ratio: 0.8
  anchor_stability_bootstrap_weight: 0.5
  adaptive_projection:
    enabled: true
    strength: 0.15
    clip_std_multiplier: 4.0
  prompt_calibration:
    enabled: false
    strength: 1.0
    max_norm_ratio: 0.0

handoff:
  latent_pooling: "last_token"
  latent_prefix_mode: "sequence"
  adapter:
    enabled: false
    train_on_missing: true
    cache_dir: ".cache/handoff_adapter"
    dataset_name: "gsm8k"
    train_split: "train"
    train_limit: 32
    max_length: 96
    strategy: "hybrid_affine"
    regularization: 1.0e-3
    residual_alpha: 1.0
    residual_max_norm_ratio: 0.5
    center: true
    use_bias: true
  generated_trajectory_adapter:
    enabled: false
    train_on_missing: true
    cache_dir: ".cache/generated_trajectory_adapter"
    training_rows_cache_dir: ".cache/generated_trajectory_rows"
    trace_cache_enabled: true
    trace_cache_dir: ".cache/generated_trajectory_traces"
    progress_interval: 1
    dataset_name: "gsm8k"
    train_split: "train"
    train_limit: 8
    input_space: "aligned"
    source_mode: "generated_text"
    source_tail_tokens: 32
    target_mode: "generated_text"
    target_alignment: "character"
    strategy: "hybrid_affine"
    regularization: 1.0e-3
    residual_alpha: 1.0
    residual_max_norm_ratio: 0.5
    center: true
    use_bias: true
    adaptive_projection_strength: 0.15
    adaptive_projection_clip_std_multiplier: 4.0
    local_residual:
      enabled: false
      top_k: 8
      temperature: 0.05
      blend: 1.0
      max_memory_rows: 4096
      chunk_size: 64
  embedding_manifold:
    enabled: false
    top_k: 4
    temperature: 0.05
    blend: 1.0
    normalize: true
    chunk_size: 16
  receiver_context:
    mode: "auto"
    latent_position: "after_context"

dynamics:
  mode: "identity"
  complexity_thresholds:
    default: 1.0
    short: 0.75
    long: 1.1
    reasoning: 1.15
    math: 1.25
    code: 1.3
    short_prompt_words: 8
    long_prompt_words: 24
  confidence_gate:
    enabled: true
    uncertainty_threshold: 8.0
    extra_discrete_steps: 3

training:
  compressed_steps: 16
  learning_rate: 1.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0
  num_epochs: 1
  reasoner_max_length: 96
  actor_max_length: 96
  lambda_task: 1.0
  lambda_pref: 1.0
  lambda_geom: 1.0
  lambda_plan: 0.25
  lambda_contrast: 0.1
  lambda_answer: 4.0
  lambda_answer_first_token: 0.0
  lambda_logit_steering: 0.0
  lambda_latent_token_decoder: 0.0
  lambda_answer_contrast: 0.0
  lambda_answer_probe: 0.0
  answer_contrast_temperature: 1.0
  answer_suffix_text: "\nFinal answer: "
  answer_max_length: 32
  answer_first_token_weight: 2.0
  answer_first_token_margin: 2.0
  logit_steering_margin: 2.0
  train_reasoner: true
  contrast_temperature: 0.1
  eps: 1.0e-8
  curriculum:
    enabled: true
    stages: ["identity", "orthogonal", "hybrid_affine"]
    boundaries: [0.33, 0.66, 1.0]
  adaptive_loss:
    enabled: true
    ema_beta: 0.9
    min_weight: 0.25
    max_weight: 4.0
  adaptive_projection:
    enabled: true
    strength: 0.15
    clip_std_multiplier: 4.0
  latent_handoff_adapter:
    enabled: true
    rank: 64
    scale: 1.0
    dropout: 0.0
  latent_answer_probe:
    enabled: false
    max_candidates: 64
    hidden_multiplier: 2
    dropout: 0.0
  latent_soft_prompt_decoder:
    enabled: false
    output_steps: 0
    num_heads: 4
    hidden_multiplier: 2
    dropout: 0.0
    residual_scale: 1.0
    max_delta_norm: 0.0
  latent_logit_steering:
    enabled: false
    rank: 64
    vocabulary_mode: tied
    lr_multiplier: 1.0
    output_steps: 1
    dropout: 0.0
    scale: 1.0
    generation_scale: 1.0
    pooling: attention
    max_bias_norm: 0.0
  latent_token_decoder:
    enabled: false
    rank: 64
    vocabulary_mode: low_rank
    lr_multiplier: 1.0
    output_steps: 8
    dropout: 0.0
    scale: 1.0
    pooling: attention
    max_bias_norm: 0.0
    candidate_token_mask: false
    require_ready: false
    eos_weight: 1.0
    margin: 0.0
  hidden_state_processor:
    enabled: false
    num_heads: 4
    dropout: 0.0
  data:
    mode: smoke
    batch_size: 2
    smoke_num_samples: 16
    dataset_name: gsm8k
    train_limit: 32
    eval_limit: 16
    eval_split: validation
  evaluation:
    max_new_tokens: 16
    baseline_accuracy_percentage: null
    seed_count: 1
    evaluate_before_training: true
    baseline_few_shot_examples: 6
    smoke_eval_set: heldout
    semantic_readout_only: false
  checkpointing:
    enabled: true
    dir: "checkpoints"
    save_every_n_steps: 0
  wandb:
    enabled: false
    project: "lxp-stage2"
    entity: null

reporting:
  training:
    history_output: "outputs/training_history.csv"
    report_output: "outputs/training_report.json"
  runtime_smoke:
    enabled: true
    max_samples: 1
    max_repetitions: 1
    max_error_count: 0
    require_explicit_statuses: true
  semantic_smoke:
    enabled: false
    sample_indices: null
    baseline_methods: ["text_text_hybrid"]
    latent_methods: ["generated_latent_handoff"]
    min_baseline_accuracy_percentage: 1.0
    min_latent_accuracy_percentage: 1.0
    min_latent_accuracy_when_sender_correct_percentage: null
    min_sender_accuracy_percentage: null
    min_sender_final_answer_marker_rate_percentage: null
    min_method_accuracy_percentage: 1.0
    min_latent_non_empty_decoded_rate_percentage: 100.0
    min_compatible_cache_transfer_rate_percentage: 100.0
    max_answer_perplexity: 10000.0
    max_degenerate_decode_count: 0
    require_baseline_final_answer_marker: true
    require_final_answer_marker_methods: ["text_text_hybrid", "generated_latent_handoff"]
    max_diagnostic_rows: 5
  phase_gates:
    phase1:
      required_repetitions: 3
      max_error_rate_percentage: 0.0
      min_cache_transfer_rate_percentage: 100.0
      min_non_empty_decoded_rate_percentage: 100.0
    phase2:
      min_accuracy_retention_ratio: 0.85
      required_seed_count: 3
    phase3:
      require_q_global_beats_prompt_local: true
      min_hybrid_accuracy_gain_over_text_text: 3.0
      max_accuracy_gap_for_perplexity_tie: 1.0
      min_perplexity_improvement_ratio: 0.10
